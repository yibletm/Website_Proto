<!DOCTYPE html>


<html>

     <title>
        Sign in
    </title>

<h2> Enter a username and password in the following boxs</h2>

<form id="signIn">

    <label for="uname"> username:</label>
    <input type="text", id="uname", name="uname">
    <label for="passw"> password:</label>
    <input type="text", id="passw", name="passw">

</form>
<button type="button", id="albu">Submit</button>
<script>
const form = document.querySelector('form');

    const button = document.getElementById("albu");
  

button.addEventListener("click", function() {
const uname = document.getElementById("uname").value
const passw = document.getElementById("passw").value
    
    if(uname.length > 0 || passw.length > 0)
    {
    alert("Username has "+uname.length+" character(s) while password has "+passw.length+" character(s)")
    alert("Try again");
    document.querySelector('#signIn').reset();
    }
    else
    {
        alert("Both fields are empty. Try again");
    }
})
    
{
    
}


</script>
